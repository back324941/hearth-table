<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搭伙晚餐 Hearth Table - 預訂系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1410; background-image: radial-gradient(#2d2420 0.5px, transparent 0.5px); background-size: 20px 20px; }
        .gold-gradient { background: linear-gradient(135deg, #d4a574 0%, #a67c52 100%); }
        .day-tab.active { border-color: #a67c52; background-color: rgba(166, 124, 82, 0.1); color: #a67c52; }
        .feature-badge { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen py-10 px-4">

    <div class="max-w-xl mx-auto">
        <!-- 訂購表單區 -->
        <div id="form-container" class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-white/20">
            <!-- 頂部標題區：凸顯特級橄欖油特色 -->
            <div class="gold-gradient p-8 text-white text-center">
                <h1 class="text-3xl font-bold tracking-[0.2em]">搭伙晚餐</h1>
                <p class="mt-1 opacity-90 font-light italic tracking-widest text-lg">Hearth Table</p>
                <div class="mt-4 inline-block px-4 py-2 feature-badge rounded-full text-xs tracking-widest font-bold border border-white/30">
                    ✨ 全面使用「特級冷壓初榨橄欖油」製作
                </div>
            </div>

            <form id="orderForm" class="p-6 space-y-8">
                <!-- 聯絡資訊 -->
                <div class="bg-gray-50 rounded-2xl p-6 space-y-6 border border-gray-100">
                    <h2 class="text-base font-black text-[#a67c52] tracking-widest border-l-4 border-[#a67c52] pl-3">基本聯絡資料</h2>
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2">聯絡人 (社群名稱 + 帳號名稱)</label>
                        <input type="text" id="userName" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#a67c52] outline-none transition-all text-base" placeholder="例如：臉書 Fall、Line 曼蒂">
                    </div>
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2">希望取餐時段</label>
                        <select id="pickupTime" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none bg-white text-base">
                            <option value="" disabled selected>請選擇時段</option>
                            <option value="17:00-18:00">17:00 - 18:00</option>
                            <option value="17:30-18:30">17:30 - 18:30</option>
                            <option value="18:30-19:00">18:30 - 19:00</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-black text-gray-700 mb-2">取餐方式 ($50/日)</label>
                        <div class="grid grid-cols-1 gap-2">
                            <label class="flex items-center p-4 border rounded-xl bg-white cursor-pointer hover:border-[#a67c52] transition-all">
                                <input type="radio" name="delivery" value="自取" checked onclick="handleDeliveryChange(false)" class="w-5 h-5 text-[#a67c52]">
                                <span class="ml-3 text-base font-medium text-gray-700">自取 (免運費)</span>
                            </label>
                            <label class="flex items-center p-4 border rounded-xl bg-white cursor-pointer hover:border-[#a67c52] transition-all">
                                <input type="radio" name="delivery" value="外送" onclick="handleDeliveryChange(true)" class="w-5 h-5 text-[#a67c52]">
                                <span class="ml-3 text-base font-medium text-gray-700">外送 (交給本人/家人/管理員)</span>
                            </label>
                        </div>
                    </div>
                    <div id="address-container" class="hidden">
                        <input type="text" id="address" class="w-full px-4 py-3 rounded-xl border border-red-100 bg-red-50/30 text-base" placeholder="請輸入外送詳細地址 (限3公里內)">
                    </div>
                </div>

                <!-- 日期菜單 -->
                <div class="space-y-4">
                    <h2 class="text-base font-black text-[#a67c52] tracking-widest border-l-4 border-[#a67c52] pl-3">選擇餐點內容 (可跨日預訂)</h2>
                    <div class="flex border rounded-xl overflow-hidden shadow-sm bg-gray-50">
                        <button type="button" onclick="switchDay('Tue')" id="tab-Tue" class="day-tab active flex-1 py-4 text-center font-black text-gray-400 border-b-2 border-transparent transition-all">週二</button>
                        <button type="button" onclick="switchDay('Wed')" id="tab-Wed" class="day-tab flex-1 py-4 text-center font-black text-gray-400 border-b-2 border-transparent transition-all">週三</button>
                        <button type="button" onclick="switchDay('Thu')" id="tab-Thu" class="day-tab flex-1 py-4 text-center font-black text-gray-400 border-b-2 border-transparent transition-all">週四</button>
                        <button type="button" onclick="switchDay('Fri')" id="tab-Fri" class="day-tab flex-1 py-4 text-center font-black text-gray-400 border-b-2 border-transparent transition-all">週五</button>
                    </div>
                    <div id="menu-sections" class="space-y-8"></div>
                </div>

                <!-- 結帳區域與重要說明 -->
                <div class="pt-6 border-t border-gray-100">
                    <!-- 訂購須知：凸顯不附白飯與範圍限制 -->
                    <div class="mb-6 px-4 py-4 bg-amber-50 border border-amber-100 rounded-2xl">
                        <h4 class="text-xs font-black text-amber-700 mb-2 tracking-widest">📝 訂購前請留意</h4>
                        <ul class="text-[13px] text-amber-800 space-y-1.5 font-bold leading-relaxed">
                            <li class="flex items-start"><span class="mr-2">🍚</span>本餐點「不附白飯」，歡迎自備或另行加點。</li>
                            <li class="flex items-start"><span class="mr-2">📍</span>外送範圍以工作室「三公里內」為主。</li>
                            <li class="flex items-start"><span class="mr-2">🌿</span>所有料理均採用特級冷壓初榨橄欖油調製。</li>
                        </ul>
                    </div>

                    <div id="fee-breakdown" class="px-2 mb-2 text-right text-xs font-bold text-gray-400 h-4"></div>
                    <div class="flex justify-between items-center mb-6 bg-[#fcfaf8] p-6 rounded-2xl border border-[#a67c52]/20 shadow-inner">
                        <span class="font-black text-[#a67c52] text-base tracking-widest">訂單預估總額</span>
                        <span class="text-4xl font-black text-[#a67c52]">NT$<span id="display-total">0</span></span>
                    </div>
                    <button type="submit" id="submitBtn" class="gold-gradient w-full py-6 rounded-2xl text-white font-black text-xl shadow-xl tracking-[0.2em] hover:brightness-105 active:scale-[0.98] transition-all">火速傳遞訂單</button>
                </div>
            </form>
        </div>

        <!-- 成功送出畫面 -->
        <div id="success-container" class="hidden bg-white rounded-3xl shadow-2xl overflow-hidden border border-white/20">
            <div class="bg-green-50 p-8 text-center border-b border-green-100">
                <div class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg">✓</div>
                <h2 class="text-2xl font-black text-gray-800 tracking-wider">訂單已成功送達！</h2>
                <p class="text-red-600 font-black mt-2 text-lg">📢 請務必「截圖」回傳至官方 LINE/臉書</p>
            </div>
            <div class="p-6 space-y-6">
                <div id="summary-content" class="bg-gray-50 rounded-2xl p-5 text-left text-base text-gray-600 whitespace-pre-line shadow-inner leading-relaxed"></div>
                <div class="bg-[#fcfaf8] rounded-2xl p-6 border-2 border-[#a67c52]/20">
                    <h3 class="text-[#a67c52] font-black text-lg mb-4 flex items-center">💳 轉帳資訊</h3>
                    <div class="space-y-3 font-medium text-gray-800">
                        <div class="flex justify-between border-b border-gray-100 pb-2"><span>國泰世華 (013)</span> <span class="font-mono">103501069021</span></div>
                        <div class="flex justify-between border-b border-gray-100 pb-2"><span>街口支付 (903)</span> <span class="font-mono">903550968</span></div>
                        <div class="flex justify-between"><span>Line Bank (824)</span> <span class="font-mono">111015190734</span></div>
                    </div>
                </div>
                <button onclick="location.reload()" class="w-full py-4 text-gray-400 font-black border-t mt-4 hover:text-[#a67c52] transition-colors">返回重新填寫</button>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxyWxhxz3yK0gdanwpXnqjgakj5dVnNcdAsQNlS5-by0xJ3N1rX0zQ0YaMJLWtQpfjV/exec';
        
        const menus = {
            Tue: { side: ["特製玉子燒", "嫩煎豆腐", "手作泡菜"], main: [{n:"蒜香雞肉",m:190,s:120},{n:"厚切豬肉",m:240,s:150},{n:"嚴選牛肉",m:280,s:170}] },
            Wed: { side: ["溏心蛋", "胡麻豆腐", "百香果青木瓜"], main: [{n:"檸檬魚片",m:240,s:150},{n:"台式油淋雞",m:190,s:120},{n:"黑椒牛排",m:280,s:170}] },
            Thu: { side: ["蔥花蛋", "紅燒豆腐", "黃金海帶絲"], main: [{n:"泰式蝦仁",m:240,s:150},{n:"香煎豬排",m:240,s:150},{n:"麻油雞腿",m:190,s:120}] },
            Fri: { side: ["奶油玉米", "香烤時蔬", "醋溜川耳"], main: [{n:"秘製滷排",m:190,s:120},{n:"清蒸鱈魚",m:280,s:170},{n:"照燒雞腿",m:240,s:150}] }
        };

        let allDaySelections = { Tue: {}, Wed: {}, Thu: {}, Fri: {} };
        let currentDay = 'Tue';

        function handleDeliveryChange(show) {
            const container = document.getElementById('address-container');
            container.classList.toggle('hidden', !show);
            document.getElementById('address').required = show;
            updateTotal();
        }

        function switchDay(day) {
            currentDay = day;
            document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
            document.getElementById(`tab-${day}`).classList.add('active');
            renderMenu();
        }

        function renderMenu() {
            const container = document.getElementById('menu-sections');
            const data = menus[currentDay];
            const sel = allDaySelections[currentDay];
            let html = '';

            // 基礎餐
            html += `<div class="space-y-4"><h3 class="text-sm font-black text-gray-500 tracking-widest flex items-center">● 選擇基礎餐份量</h3><div class="bg-white border border-gray-100 rounded-2xl p-5 shadow-sm"><div class="grid grid-cols-1 gap-3"><div class="grid grid-cols-2 gap-3">
                <label class="cursor-pointer"><input type="radio" name="baseSize" value="M" ${sel.baseSize==='M'?'checked':''} onchange="updateSel('baseSize','M')" class="peer sr-only"><div class="py-5 text-center border-2 rounded-2xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52] transition-all text-lg">大份 M ($290)</div></label>
                <label class="cursor-pointer"><input type="radio" name="baseSize" value="S" ${sel.baseSize==='S'?'checked':''} onchange="updateSel('baseSize','S')" class="peer sr-only"><div class="py-5 text-center border-2 rounded-2xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52] transition-all text-lg">小份 S ($180)</div></label>
            </div><label class="cursor-pointer"><input type="radio" name="baseSize" value="NONE" ${sel.baseSize==='NONE'?'checked':''} onchange="updateSel('baseSize','NONE')" class="peer sr-only"><div class="py-4 text-center border-2 rounded-2xl font-black text-gray-400 peer-checked:border-red-500 peer-checked:bg-red-50 peer-checked:text-red-600 transition-all text-sm">不需要基礎餐 (需補收包裝人力費 $50)</div></label></div></div></div>`;

            // 當日副菜
            html += `<div class="space-y-3"><h3 class="text-sm font-black text-gray-500 tracking-widest">● 選擇當日副菜</h3>`;
            data.side.forEach(opt => {
                html += `<label class="block cursor-pointer"><input type="radio" name="sideChoice" value="${opt}" ${sel.sideChoice===opt?'checked':''} onchange="updateSel('sideChoice','${opt}')" class="peer sr-only"><div class="p-5 bg-white border border-gray-100 rounded-2xl peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 flex justify-between items-center transition-all shadow-sm"><span class="font-black text-gray-700 text-base">${opt}</span><span class="text-xs font-black text-[#a67c52] opacity-0 peer-checked:opacity-100">已選擇</span></div></label>`;
            });
            html += `</div>`;

            // 加點內容
            html += `<div class="space-y-3"><h3 class="text-sm font-black text-gray-500 tracking-widest">● 加點內容</h3>`;
            data.main.forEach((m, idx) => { html += renderItemRow(`main-${idx}`, `主菜－${m.n}`, m.m, m.s); });
            data.side.forEach((s, idx) => { html += renderItemRow(`extraSide-${idx}`, `副菜－${s}`, 70, 40); });
            html += renderSingleRow(`extraSoup`, `加點－主廚例湯`, 60);
            html += `</div>`;

            container.innerHTML = html;
        }

        function updateSel(key, val) { allDaySelections[currentDay][key] = val; updateTotal(); }

        function renderItemRow(id, name, pM, pS) {
            const valM = allDaySelections[currentDay][id+'-M'] || 0;
            const valS = allDaySelections[currentDay][id+'-S'] || 0;
            return `<div class="flex flex-col md:flex-row md:items-center justify-between p-5 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <div><h4 class="font-black text-gray-800 text-base">${name}</h4><div class="text-xs font-bold text-gray-400 mt-1">M: $${pM} / S: $${pS}</div></div>
                <div class="flex gap-2 mt-3 md:mt-0">
                    <div class="flex items-center bg-gray-50 rounded-xl px-2 border"><span class="text-xs font-black mr-2 text-gray-400">M</span><button type="button" onclick="changeQty('${id}-M',-1)" class="w-10 h-10 font-black text-gray-400">－</button><span class="w-8 text-center font-black text-lg text-gray-700">${valM}</span><button type="button" onclick="changeQty('${id}-M',1)" class="w-10 h-10 font-black text-[#a67c52]">＋</button></div>
                    <div class="flex items-center bg-gray-50 rounded-xl px-2 border"><span class="text-xs font-black mr-2 text-gray-400">S</span><button type="button" onclick="changeQty('${id}-S',-1)" class="w-10 h-10 font-black text-gray-400">－</button><span class="w-8 text-center font-black text-lg text-gray-700">${valS}</span><button type="button" onclick="changeQty('${id}-S',1)" class="w-10 h-10 font-black text-[#a67c52]">＋</button></div>
                </div></div>`;
        }

        function renderSingleRow(id, name, price) {
            const val = allDaySelections[currentDay][id] || 0;
            return `<div class="flex flex-col md:flex-row md:items-center justify-between p-5 bg-white border border-gray-100 rounded-2xl shadow-sm">
                <div><h4 class="font-black text-gray-800 text-base">${name}</h4><div class="text-[#a67c52] text-xs font-black mt-1">$${price}</div></div>
                <div class="flex mt-3 md:mt-0">
                    <div class="flex items-center bg-gray-50 rounded-xl px-2 border w-full md:w-auto justify-center"><button type="button" onclick="changeQty('${id}',-1)" class="w-10 h-10 font-black text-gray-400">－</button><span class="w-12 text-center font-black text-lg text-gray-700">${val}</span><button type="button" onclick="changeQty('${id}',1)" class="w-10 h-10 font-black text-[#a67c52]">＋</button></div>
                </div></div>`;
        }

        function changeQty(id, amt) {
            allDaySelections[currentDay][id] = Math.max(0, (allDaySelections[currentDay][id] || 0) + amt);
            renderMenu(); updateTotal();
        }

        function updateTotal() {
            let itemTotal = 0; let activeDays = 0;
            const isDelivery = document.querySelector('input[name="delivery"]:checked').value !== '自取';
            ['Tue', 'Wed', 'Thu', 'Fri'].forEach(day => {
                const sel = allDaySelections[day]; if (!sel.baseSize) return;
                activeDays++;
                if (sel.baseSize === 'M') itemTotal += 290; else if (sel.baseSize === 'S') itemTotal += 180; else if (sel.baseSize === 'NONE') itemTotal += 50;
                Object.keys(sel).forEach(k => {
                    if (k === 'baseSize' || k === 'sideChoice' || sel[k] === 0) return;
                    if (k.startsWith('main')) {
                        const [_, idx, sz] = k.split('-'); itemTotal += sel[k] * (sz === 'M' ? menus[day].main[idx].m : menus[day].main[idx].s);
                    } else if (k.startsWith('extraSide')) {
                        const [_, idx, sz] = k.split('-'); itemTotal += sel[k] * (sz === 'M' ? 70 : 40);
                    } else if (k === 'extraSoup') itemTotal += sel[k] * 60;
                });
            });
            const deliveryFee = isDelivery ? (activeDays * 50) : 0;
            document.getElementById('display-total').innerText = (itemTotal + deliveryFee).toLocaleString();
            document.getElementById('fee-breakdown').innerText = (isDelivery && activeDays > 0) ? `(外送費總計 ${activeDays}天 × $50 = $${deliveryFee})` : "";
        }

        switchDay('Tue');

        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            let finalSummary = ""; let hasOrder = false;
            ['Tue', 'Wed', 'Thu', 'Fri'].forEach(day => {
                const sel = allDaySelections[day]; if (!sel.baseSize) return;
                hasOrder = true;
                const dayName = {Tue:'週二', Wed:'週三', Thu:'週四', Fri:'週五'}[day];
                finalSummary += `【${dayName}】\n- 選項：${sel.baseSize==='NONE'?'補收包裝費':sel.baseSize}\n- 副菜：${sel.sideChoice || '未選'}\n`;
                Object.keys(sel).forEach(k => {
                    if (k !== 'baseSize' && k !== 'sideChoice' && sel[k] > 0) {
                        if (k.startsWith('main')) {
                            const [_, idx, sz] = k.split('-'); finalSummary += `- 主菜：${menus[day].main[idx].n}(${sz}) x${sel[k]}\n`;
                        } else if (k.startsWith('extraSide')) {
                            const [_, idx, sz] = k.split('-'); finalSummary += `- 副菜：${menus[day].side[idx]}(${sz}) x${sel[k]}\n`;
                        } else if (k === 'extraSoup') finalSummary += `- 加點主廚例湯 x${sel[k]}\n`;
                    }
                });
                finalSummary += "\n";
            });

            if (!hasOrder) return alert('請選擇餐點內容！');
            const btn = document.getElementById('submitBtn'); btn.disabled = true; btn.innerText = "訂單傳遞中...";
            
            const deliveryType = document.querySelector('input[name="delivery"]:checked').value;
            const finalData = {
                "聯絡人": document.getElementById('userName').value,
                "時段": document.getElementById('pickupTime').value,
                "取餐": deliveryType,
                "地址": document.getElementById('address').value || '自取',
                "付款": "轉帳/現金",
                "內容": finalSummary,
                "總額": document.getElementById('display-total').innerText
            };

            try {
                const params = new URLSearchParams(); params.append('formData', JSON.stringify(finalData));
                await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: params });
                document.getElementById('form-container').classList.add('hidden');
                document.getElementById('success-container').classList.remove('hidden');
                document.getElementById('summary-content').innerText = `聯絡人：${finalData["聯絡人"]}\n取餐方式：${finalData["取餐"]}\n外送地址：${finalData["地址"]}\n應付總額：NT$${finalData["總額"]}\n\n訂單明細：\n${finalSummary}`;
                window.scrollTo(0, 0);
            } catch (err) { alert('發送失敗'); btn.disabled = false; btn.innerText = "重新送出"; }
        });
    </script>
</body>
</html>
